<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love Story</title>
    <style>
        :root {
            --pink-soft: #ffafbd;
            --pink-dark: #ffc3a0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, var(--pink-soft), var(--pink-dark));
            color: #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        /* Container Musik */
        .music-box {
            margin-top: 20px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        /* Gallery Foto */
        .slideshow {
            width: 80%;
            max-width: 400px;
            height: 400px;
            margin: 30px 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
        }

        .slideshow img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            left: 0;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .slideshow img.active {
            opacity: 1;
        }

        /* Counter */
        .counter-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 50px;
        }

        .timer {
            display: flex;
            gap: 15px;
            justify-content: center;
            font-weight: bold;
        }

        .time-box {
            display: flex;
            flex-direction: column;
        }

        .time-box span:first-child {
            font-size: 2rem;
            color: #d63384;
        }

        h1 { margin-top: 40px; font-size: 1.5rem; }
    </style>
</head>
<body>

    <h1>Sudah Selama Ini Kita Bersama ❤️</h1>

    <div class="slideshow" id="gallery">
        </div>

    <div class="counter-container">
        <div class="timer" id="timer">
            <div class="time-box"><span id="days">0</span><span>Hari</span></div>
            <div class="time-box"><span id="hours">0</span><span>Jam</span></div>
            <div class="time-box"><span id="minutes">0</span><span>Menit</span></div>
            <div class="time-box"><span id="seconds">0</span><span>Detik</span></div>
        </div>
        <p style="margin-top: 15px; color: #888;">Sejak 05 Februari 2026</p>
    </div>

    <div class="music-box">
        <audio controls loop>
            <source src="hindia.mp3" type="audio/mpeg">
            Browser kamu tidak mendukung audio.
        </audio>
    </div>

    <script>
        // 1. Logic Panggil Foto (1-6, 8, 9) sesuai screenshot
        const photos = ['1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg', '6.jpg', '8.jpg', '9.jpg'];
        const gallery = document.getElementById('gallery');

        photos.forEach((src, index) => {
            const img = document.createElement('img');
            img.src = src;
            if(index === 0) img.classList.add('active');
            gallery.appendChild(img);
        });

        // Slideshow Animation
        let currentIdx = 0;
        const images = document.querySelectorAll('.slideshow img');
        setInterval(() => {
            images[currentIdx].classList.remove('active');
            currentIdx = (currentIdx + 1) % images.length;
            images[currentIdx].classList.add('active');
        }, 3000); // Ganti foto tiap 3 detik

        // 2. Logic Counter Waktu Jadian
        const anniversaryDate = new Date("February 5, 2026 00:00:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const diff = now - anniversaryDate;

            // Jika tanggal jadian belum lewat, diff akan negatif
            const positiveDiff = Math.max(0, diff);

            const d = Math.floor(positiveDiff / (1000 * 60 * 60 * 24));
            const h = Math.floor((positiveDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((positiveDiff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((positiveDiff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d;
            document.getElementById("hours").innerText = h;
            document.getElementById("minutes").innerText = m;
            document.getElementById("seconds").innerText = s;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
