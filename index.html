<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Aesthetic X</title>
    <style>
        /* --- CSS DASAR --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden; /* Biar gak ada scrollbar */
            color: white;
            position: relative;
        }

        /* --- BACKGROUND FOTO --- */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Ganti bg.jpg dengan nama file foto kamu */
            background: url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            z-index: -2; /* Paling belakang */
        }

        /* Efek Gelap biar tulisan kebaca */
        .dark-filter {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* Gelap 50% */
            z-index: -1;
        }

        /* --- FITUR KATA-KATA KANAN ATAS --- */
        .quotes-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.3);
            transition: 0.3s;
            z-index: 100;
        }

        .quotes-btn:hover { background: rgba(255, 255, 255, 0.4); }

        /* --- KONTEN TENGAH --- */
        .main-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        #hari { font-size: 1.3rem; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; opacity: 0.9; }
        #clock { font-size: 4rem; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        #timer { font-size: 1rem; opacity: 0.7; margin-bottom: 30px; }

        /* --- MUSIC PLAYER --- */
        .music-player {
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        audio {
            height: 35px;
            outline: none;
            opacity: 0.7;
            /* Liat trik ini buat bikin audionya putih di beberapa browser */
            filter: invert(1) sepia(1) saturate(5) hue-rotate(175deg);
        }

        /* --- FITUR PESAN --- */
        .message-form {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            width: 300px;
        }

        .message-form h3 { margin-bottom: 15px; font-size: 1.1rem; }

        .message-form input, .message-form textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            color: white;
        }

        .message-form textarea { resize: none; height: 60px; }

        .message-form button {
            width: 100%;
            padding: 10px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .message-form button:hover { background-color: #ff6b81; }

        /* --- ANIMASI HUJAN LOPE (LOVE) --- */
        .heart {
            position: fixed;
            top: -1vh;
            transform: translateY(0);
            animation: fall linear forwards;
            color: #ff6b81; /* Warna lope */
            opacity: 0.7;
            z-index: 1; /* Di atas filter gelap, di bawah konten */
        }

        @keyframes fall {
            to {
                transform: translateY(105vh);
            }
        }

    </style>
</head>
<body>

    <div class="background-overlay"></div>
    <div class="dark-filter"></div>

    <div class="quotes-btn" onclick="tampilKata()">Quotes ✨</div>

    <div class="main-container">
        
        <div id="hari">MEMUAT HARI...</div>
        <h1 id="clock">00:00:00</h1>
        <div id="timer">Memuat timer...</div>

        <div class="music-player">
            <audio id="myAudio" controls autoplay loop>
                <source src="musik_x.mp3" type="audio/mpeg">
                Browser kamu gak support audio.
            </audio>
        </div>

        <div class="message-form">
            <h3>Kirim Pesan Ke Aku</h3>
            <form action="https://formspree.io/f/your_endpoint" method="POST">
                <input type="text" name="name" placeholder="Nama Kamu" required>
                <textarea name="message" placeholder="Pesan kamu..." required></textarea>
                <button type="submit">Kirim Pesan</button>
            </form>
            <p style="font-size: 0.7rem; opacity: 0.5; margin-top: 5px;">*Tinggalin nama/pesan di sini.</p>
        </div>

    </div>

    <script>
        // --- 1. UPDATE WAKTU REAL-TIME ---
        function updateTime() {
            const now = new Date();
            
            // Format Hari (Tidak diubah, jalan terus)
            const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            document.getElementById('hari').innerText = days[now.getDay()];

            // Format Jam (Utama)
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${hours}:${minutes}:${seconds}`;

            // Timer (Teks tambahan yang jalan terus)
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateString = now.toLocaleDateString('id-ID', options);
            document.getElementById('timer').innerText = dateString + " | " + now.toLocaleTimeString('id-ID');
        }

        // --- 2. FITUR KATA-KATA (Quotes) ---
        function tampilKata() {
            const listKata = [
                "Tetap semangat, hari ini milikmu! 🌟",
                "Jangan lupa bernafas, dunia tidak sejahat itu. ✨",
                "Terus jalan, meskipun pelan. 🐢",
                "Kamu lebih kuat dari yang kamu kira. 💪",
                "Musik X jalan terus, mimpi juga harus terus dikejar! 🔥",
                "Jangan lupa senyum hari ini! 😊",
                "Apa pun yang terjadi, hadapi dengan tenang. 🧘‍♂️"
            ];
            const randomKata = listKata[Math.floor(Math.random() * listKata.length)];
            alert(randomKata); // Pake alert sederhana aja
        }

        // --- 3. ANIMASI HUJAN LOPE ---
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️'; // Karakter lope
            
            // Posisi random horizontal
            heart.style.left = Math.random() * 100 + "vw";
            
            // Ukuran random
            const size = Math.random() * 1.5 + 0.5; // 0.5rem - 2rem
            heart.style.fontSize = size + "rem";
            
            // Kecepatan jatuh random (3s - 8s)
            const duration = Math.random() * 5 + 3;
            heart.style.animationDuration = duration + "s";
            
            // Opacity random
            heart.style.opacity = Math.random() * 0.5 + 0.2; // 0.2 - 0.7

            document.body.appendChild(heart);

            // Hapus elemen setelah jatuh biar gak ngebatin memori
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        // Jalankan Hujan Lope setiap 300ms
        setInterval(createHeart, 300);

        // --- JALANKAN SEMUA FUNGSI ---
        setInterval(updateTime, 1000); // Update jam tiap detik
        updateTime(); // Jalankan sekali di awal

        // Trik Autoplay Musik (Beberapa browser butuh interaksi user dulu)
        window.addEventListener('click', function() {
            const audio = document.getElementById('myAudio');
            if (audio.paused) {
                audio.play();
            }
        }, { once: true }); // Cuma sekali klik

    </script>
</body>
</html>
