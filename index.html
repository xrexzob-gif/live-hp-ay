<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory 05-02-2026</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #1a1a1a; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .notebook { width: 90%; height: 85vh; background: #2d2d2d; border-radius: 10px; position: relative; padding: 20px; box-sizing: border-box; border: 2px solid #444; }
        
        /* Timer Jadian */
        .timer { background: #3d3d3d; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 20px; border: 1px solid #e28e8e; color: #e28e8e; font-size: 14px; }

        /* Area Foto */
        .photo-frame { width: 100%; height: 60%; background: #222; border-radius: 5px; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .photo-frame img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Audio Player Minimalis */
        audio { width: 100%; margin-top: 15px; height: 30px; filter: invert(1); }

        /* TAB KAYA TIKTOK (Samping Kanan) */
        .tabs { position: absolute; right: -35px; top: 20px; display: flex; flex-direction: column; gap: 8px; }
        .tab { width: 60px; height: 40px; color: white; text-decoration: none; font-weight: bold; font-size: 12px; display: flex; justify-content: center; align-items: center; border-radius: 0 8px 8px 0; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); cursor: pointer; border: none; }
        
        /* Warna-warni Tab */
        .t1 { background: #8E9775; } .t2 { background: #E28E8E; } .t3 { background: #6D8299; }
        .t4 { background: #D4A373; } .t5 { background: #A98467; } .t6 { background: #BC8F8F; }
        .t8 { background: #52796F; } .t9 { background: #354F52; }
    </style>
</head>
<body>

    <div class="notebook">
        <div class="timer">
            ❤️ <span id="days">0</span> Hari Jadian ❤️<br>
            <small id="clock">00:00:00</small>
        </div>

        <div class="photo-frame">
            <img id="mainPhoto" src="1.jpg" alt="Memory">
        </div>

        <p style="text-align: center; font-size: 12px; margin-top: 10px;">🎵 Now Playing: Hindia.mp3</p>
        <audio controls autoplay loop>
            <source src="hindia.mp3" type="audio/mpeg">
        </audio>

        <div class="tabs">
            <button class="tab t1" onclick="changeImg('1.jpg')">01</button>
            <button class="tab t2" onclick="changeImg('2.jpg')">02</button>
            <button class="tab t3" onclick="changeImg('3.jpg')">03</button>
            <button class="tab t4" onclick="changeImg('4.jpg')">04</button>
            <button class="tab t5" onclick="changeImg('5.jpg')">05</button>
            <button class="tab t6" onclick="changeImg('6.jpg')">06</button>
            <button class="tab t8" onclick="changeImg('8.jpg')">08</button>
            <button class="tab t9" onclick="changeImg('9.jpg')">09</button>
        </div>
    </div>

    <script>
        // Ganti Foto Saat Tab Diklik
        function changeImg(imgName) {
            document.getElementById('mainPhoto').src = imgName;
        }

        // Hitung Waktu Jadian (05-02-2026)
        const start = new Date("Feb 5, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = now - start;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("days").innerText = d;
            document.getElementById("clock").innerText = h + " Jam " + m + " Menit " + s + " Detik";
        }, 1000);
    </script>
</body>
</html>
