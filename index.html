<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu 💙</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background: linear-gradient(180deg,#0f172a,#020617);
  color:white;
  text-align:center;
}

.container{
  padding:20px;
}

h1{font-size:28px;}
h2{color:#93c5fd;font-size:16px;}

img{
  width:150px;
  border-radius:15px;
  margin-top:15px;
}

.box{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
  font-size:14px;
}

button{
  margin-top:15px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
}

#days{
  margin-top:10px;
  color:#60a5fa;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>Untuk Kamu 💙</h1>
<h2>05 Februari 2026</h2>

<img src="IMG-Foto-Gue.jpg">

<div id="days"></div>

<div class="box">
Hari itu bukan cuma tanggal biasa...<br>
Itu awal dari cerita kita 💙
</div>

<button onclick="start()">Klik ini 💌</button>

<p id="hidden" style="display:none;">
Makasih udah ada 💙<br>I love you
</p>

<audio id="music" loop>
  <source src="hindia.mp3">
</audio>

</div>

<script>

// 🔥 HITUNG HARI REALTIME
function updateDays(){
  const start = new Date("2026-02-05");
  const now = new Date();
  const diff = now - start;

  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff / (1000*60*60)) % 24);
  const minutes = Math.floor((diff / (1000*60)) % 60);

  if(diff >= 0){
    document.getElementById("days").innerText =
      `Kita sudah bersama ${days} hari ${hours} jam ${minutes} menit 💙`;
  } else {
    document.getElementById("days").innerText =
      "Menuju hari spesial kita 💙";
  }
}

// update tiap detik
setInterval(updateDays,1000);
updateDays();

function start(){
  document.getElementById("hidden").style.display="block";
  document.getElementById("music").play();
}

</script>

</body>
</html>
