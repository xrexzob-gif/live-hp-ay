<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XREXZOB ❤️ RAISA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Reenie+Beanie&display=swap');

        /* CSS Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #000; overflow: hidden; color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif; width: 100%; height: 100vh;
        }

        /* LAYAR PIN DENGAN GIF BAGUS */
        #pin-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('1.gif');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999;
            transition: transform 1.2s cubic-bezier(0.7, 0, 0.3, 1), opacity 1s ease-in-out;
        }

        .pin-header h2 { font-size: 1.4rem; letter-spacing: 4px; margin-bottom: 25px; text-transform: uppercase; }
        .pin-dots { display: flex; gap: 15px; margin-bottom: 40px; }
        .dot { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; }
        .dot.active { background: #fff; border-color: #fff; box-shadow: 0 0 15px #fff; transform: scale(1.2); }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 260px; }
        .key {
            aspect-ratio: 1/1; border-radius: 50%; background: rgba(255,255,255,0.1);
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }

        /* KONTEN UTAMA */
        #main-content { display: none; text-align: center; height: 100vh; position: relative; opacity: 0; transition: opacity 1.5s ease-in-out; }
        .stars-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #1b2735 0%, #000 100%); }

        /* CAROUSEL 3D MEWAH - ANIMASI GERAK BARU */
        .heart-stage {
            height: 40vh; display: flex; justify-content: center; align-items: center;
            perspective: 2000px; /* Jarak perspective 3D, kunci buat efek fotonya */
            margin-top: 40px;
        }
        .heart-carousel {
            position: relative; width: 100px; height: 100px;
            transform-style: preserve-3d;
            animation: rotate3DLove 25s infinite linear; /* Rotasi 3D perlahan, VIP style */
        }
        @keyframes rotate3DLove {
            from { transform: rotateY(0deg) rotateX(10deg); } /* Sedikit rotateX biar fotonya gak sejajar */
            to { transform: rotateY(360deg) rotateX(10deg); }
        }

        /* GIF Utama di Tengah-tengah pola hati */
        .center-gif {
            position: absolute; width: 120px; height: 120px;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            border-radius: 50%; border: 3px solid #ffb6c1;
            box-shadow: 0 0 30px #ffb6c1; z-index: 10;
            object-fit: cover; animation: pulseGlow 3s infinite;
        }
        @keyframes pulseGlow { 0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 20px #ffb6c1; } 50% { transform: translate(-50%, -50%) scale(1.08); box-shadow: 0 0 40px #ffb6c1; } }

        .photo-frame { 
            position: absolute; width: 100px; height: 130px; 
            background: #fff; padding: 4px; border-radius: 5px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            /* Pastikan frame fotonya responsif terhadap perspective parentnya */
            transform-style: preserve-3d;
            backface-visibility: visible; /* Biar foto keliatan dari belakang pas muter */
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; border-radius: 3px; }

        /* KATA-KATA & TIMER MEWAH */
        .words-container { padding: 0 20px; margin-top: 30px; }
        .love-title { font-family: 'Reenie Beanie', cursive; font-size: 3.2rem; color: #ffb6c1; margin-bottom: 5px; display: block; text-shadow: 0 0 15px rgba(255,182,193,0.5); }
        
        .message-box { 
            font-size: 0.95rem; line-height: 1.6; color: #eee;
            margin-bottom: 25px; padding: 0 10px; font-style: italic; opacity: 0.8;
        }

        /* TIMER GRADASI BARU */
        .timer-display { 
            font-size: 1.2rem; font-weight: 800;
            background: linear-gradient(to right, #ffffff, #ffb6c1, #ffffff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            padding: 12px 25px; border: 1px solid rgba(255,182,193,0.3);
            border-radius: 50px; display: inline-block;
        }

        footer { position: absolute; bottom: 15px; width: 100%; font-size: 0.65rem; opacity: 0.3; letter-spacing: 5px; }
    </style>
</head>
<body>

<div id="pin-overlay">
    <div class="pin-header">
        <h2>DEVICE LOCKED FOR RAISA</h2> </div>
    <div class="pin-dots" id="dots-container">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="keypad" onclick="handlePin(event)">
        <div class="key">1</div><div class="key">2</div><div class="key">3</div>
        <div class="key">4</div><div class="key">5</div><div class="key">6</div>
        <div class="key">7</div><div class="key">8</div><div class="key">9</div>
        <div style="visibility:hidden"></div><div class="key">0</div><div class="key" style="font-size: 0.6rem;">DEL</div>
    </div>
</div>

<div id="main-content">
    <div class="stars-bg"></div>
    
    <div class="heart-stage">
        <img src="2.gif" class="center-gif"> 
        <div class="heart-carousel" id="carousel">
            <div class="photo-frame"><img src="1.jpg"></div>
            <div class="photo-frame"><img src="2.jpg"></div>
            <div class="photo-frame"><img src="3.jpg"></div>
            <div class="photo-frame"><img src="4.jpg"></div>
            <div class="photo-frame"><img src="1.gif"></div>
            <div class="photo-frame"><img src="2.gif"></div>
            <div class="photo-frame"><img src="5.jpg"></div>
            <div class="photo-frame"><img src="6.jpg"></div>
            <div class="photo-frame"><img src="8.jpg"></div>
            <div class="photo-frame"><img src="9.jpg"></div>
        </div>
    </div>

    <div class="words-container">
        <span class="love-title">For My Raisa 💞</span> <div class="message-box">
            "Sejak 5 Februari 2026, duniaku cuma berputar di kamu. Makasih udah nemenin hari-hari aku. I love you, now and forever." </div>
        <div class="timer-display" id="timer">Loading memory...</div>
    </div>

    <footer>CREATED BY XREXZOB</footer> </div>

<audio id="bgMusic" loop preload="auto"><source src="Bersamamu.mp3" type="audio/mpeg"></audio> <script>
    let input = "";
    const pin = "050226"; //
    const dots = document.querySelectorAll('.dot');
    const music = document.getElementById('bgMusic');

    function handlePin(e) {
        const key = e.target.innerText;
        if (!key) return;
        if (key === "DEL") input = input.slice(0, -1);
        else if (input.length < 6 && !isNaN(key)) input += key;

        dots.forEach((dot, i) => {
            if (i < input.length) dot.classList.add('active');
            else dot.classList.remove('active');
        });

        if (input === pin) {
            unlock();
        } else if (input.length === 6) {
            input = "";
            dots.forEach(d => d.classList.remove('active'));
            // Visual feedback salah pin
            dots.forEach(d => d.style.borderColor = 'red');
            setTimeout(() => dots.forEach(d => d.style.borderColor = '#fff'), 500);
        }
    }

    function unlock() {
        const overlay = document.getElementById('pin-overlay');
        const main = document.getElementById('main-content');
        
        // Transisi mewah buka kunci
        overlay.style.transform = "translateY(-100%) scale(1.1)";
        overlay.style.opacity = "0";
        
        setTimeout(() => {
            overlay.style.display = "none";
            main.style.display = "block";
            // Slow fade-in content
            setTimeout(() => main.style.opacity = "1", 100);
            
            music.play().catch(() => {
                document.body.addEventListener('touchstart', () => music.play(), {once: true});
            });
            startTimer();
            build3DHeart(); // Panggil fungsi 3D yang baru
        }, 800);
    }

    function startTimer() {
        const startDate = new Date("February 5, 2026 00:00:00").getTime(); //
        setInterval(() => {
            const now = new Date().getTime();
            const d = now - startDate;
            const mo = Math.floor(d / 2629746000);
            const dy = Math.floor((d % 2629746000) / 86400000);
            const h = Math.floor((d % 86400000) / 3600000);
            const mi = Math.floor((d % 3600000) / 60000);
            const s = Math.floor((d % 60000) / 1000);
            // format 2bln 18hr 19:37:2
            document.getElementById('timer').innerText = `${mo}bln ${dy}hr ${h}:${mi}:${s}`;
        }, 1000);
    }

    // LOGIKA ANIMASI GERAK 3D BARU
    function build3DHeart() {
        const frames = document.querySelectorAll('.photo-frame');
        const total = frames.length;
        const radius = 11; // Radius bentuk hati

        frames.forEach((f, i) => {
            const angle = (i / total) * 2 * Math.PI;
            // Rumus parametric curve buat bentuk hati (Love)
            const x = 16 * Math.pow(Math.sin(angle), 3) * radius; 
            const y = -(13 * Math.cos(angle) - 5 * Math.cos(2*angle) - 2 * Math.cos(3*angle) - Math.cos(4*angle)) * radius;
            
            // Tambahkan translateZ sedikit biar fotonya numpuk 3D
            const translateZ = Math.sin(angle) * 120; // Ini kunci perspective fotonya
            
            // Kashi rotasi dikit biar foto madep ke kamera pas muter
            const rotateY = (angle * 180 / Math.PI) + 90;

            f.style.transform = `translate3d(${x}px, ${y}px, ${translateZ}px) rotateY(${rotateY}deg)`;
        });
    }
</script>
</body>
</html>
