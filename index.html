<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Together Forever</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;800&family=Quicksand:wght@300;600&display=swap');

        /* Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #000; overflow: hidden; color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif; width: 100%; height: 100vh;
        }

        /* LAYAR PIN MINIMALIS */
        #pin-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('IMG-Foto-Gue.jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: transform 1.2s cubic-bezier(0.7, 0, 0.3, 1), opacity 1s;
        }

        .pin-header h2 { font-size: 1.2rem; letter-spacing: 4px; margin-bottom: 25px; text-transform: uppercase; }
        .pin-dots { display: flex; gap: 12px; margin-bottom: 35px; }
        .dot { width: 10px; height: 10px; border: 1.5px solid rgba(255,255,255,0.5); border-radius: 50%; transition: 0.3s; }
        .dot.active { background: #fff; border-color: #fff; box-shadow: 0 0 10px #fff; transform: scale(1.2); }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 220px; }
        .key {
            aspect-ratio: 1/1; border-radius: 50%; background: rgba(255,255,255,0.08);
            display: flex; justify-content: center; align-items: center;
            font-size: 1.4rem; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); transition: 0.2s;
        }
        .key:active { background: rgba(255,255,255,0.2); transform: scale(0.9); }

        /* KONTEN UTAMA */
        #main-content { display: none; text-align: center; height: 100vh; position: relative; opacity: 0; transition: opacity 1.5s; }
        
        /* ANIMASI BACKGROUND PARTIKEL & NEBULA */
        #bg-stage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle at center, #1b2735 0%, #000 100%);
            overflow: hidden;
        }
        .nebula {
            position: absolute; width: 150%; height: 150%; top: -25%; left: -25%;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
            opacity: 0.15; animation: spaceDrift 60s linear infinite;
        }
        .stars {
            position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(#fff 1px, transparent 1px), radial-gradient(#fff 1px, transparent 1px);
            background-size: 50px 50px; background-position: 0 0, 25px 25px;
            opacity: 0.05; animation: starTwinkle 5s infinitealternate;
        }
        @keyframes spaceDrift { from { transform: translate(0, 0); } to { transform: translate(10%, 10%); } }
        @keyframes starTwinkle { from { opacity: 0.03; } to { opacity: 0.08; } }

        /* LOVE CAROUSEL */
        .heart-stage {
            height: 40vh; display: flex; justify-content: center; align-items: center;
            perspective: 1000px; margin-top: 40px;
        }
        .heart-carousel {
            position: relative; width: 80px; height: 80px;
            transform-style: preserve-3d; animation: rotateLove 20s infinite linear;
        }
        @keyframes rotateLove { from { transform: rotateY(0deg) rotateX(5deg); } to { transform: rotateY(360deg) rotateX(5deg); } }

        /* Gif 2 di tengah Love */
        .center-gif {
            position: absolute; width: 110px; height: 110px;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            border-radius: 50%; border: 3px solid #ffb6c1;
            box-shadow: 0 0 20px #ffb6c1; z-index: 10;
            object-fit: cover; animation: pulseGlow 2s infinite;
        }
        @keyframes pulseGlow { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.08); } }

        .photo-frame { 
            position: absolute; width: 85px; height: 110px; 
            background: #fff; padding: 4px; border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* PESAN BARU AKU-KAMU */
        .words-container { padding: 0 20px; margin-top: 20px; }
        .love-letter { font-family: 'Reenie Beanie', cursive; font-size: 2.8rem; color: #ffb6c1; margin-bottom: 5px; display: block; }
        
        .message-box { 
            font-size: 0.9rem; line-height: 1.5; color: #eee;
            margin-bottom: 25px; padding: 0 10px; font-style: italic; opacity: 0.8;
        }

        /* TIMER WARNA BARU (GRADASI ROSE GOLD) */
        .timer-display { 
            font-size: 1.1rem; font-weight: 800;
            background: linear-gradient(to right, #ffffff, #ffb6c1, #ffffff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            padding: 10px 20px; border: 1px solid rgba(255,182,193,0.3);
            border-radius: 50px; display: inline-block;
        }

        footer { position: absolute; bottom: 15px; width: 100%; font-size: 0.6rem; opacity: 0.3; letter-spacing: 5px; }
    </style>
</head>
<body>

<div id="pin-overlay">
    <div class="pin-header">
        <h2>XREXZOB PRIVATE</h2>
    </div>
    <div class="pin-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="keypad" id="keypad">
        <div class="key">1</div><div class="key">2</div><div class="key">3</div>
        <div class="key">4</div><div class="key">5</div><div class="key">6</div>
        <div class="key">7</div><div class="key">8</div><div class="key">9</div>
        <div></div><div class="key">0</div><div class="key" style="font-size: 0.7rem;">DEL</div>
    </div>
</div>

<div id="main-content">
    <div id="bg-stage">
        <div class="nebula"></div>
        <div class="stars"></div>
    </div>
    
    <div class="heart-stage">
        <img src="2.gif" class="center-gif"> 
        <div class="heart-carousel" id="carousel">
            <div class="photo-frame"><img src="1.jpg"></div>
            <div class="photo-frame"><img src="2.jpg"></div>
            <div class="photo-frame"><img src="3.jpg"></div>
            <div class="photo-frame"><img src="4.jpg"></div>
            <div class="photo-frame"><img src="1.gif"></div>
            <div class="photo-frame"><img src="5.jpg"></div>
            <div class="photo-frame"><img src="6.jpg"></div>
            <div class="photo-frame"><img src="8.jpg"></div>
            <div class="photo-frame"><img src="9.jpg"></div>
        </div>
    </div>

    <div class="words-container">
        <span class="love-letter">Dearest, Raisa</span>
        <div class="message-box">
            "Duniaku jauh lebih indah sejak kamu ada di dalamnya. Makasih udah jadi alasan aku buat terus semangat setiap hari. Aku sayang kamu, selamanya."
        </div>
        <div class="timer-display" id="timer">Memuat memori...</div>
    </div>

    <footer>BY XREXZOB 2026</footer>
</div>

<audio id="bgMusic" loop preload="auto"><source src="Bersamamu.mp3" type="audio/mpeg"></audio>

<script>
    let input = "";
    const pin = "050226";
    const dots = document.querySelectorAll('.dot');
    const music = document.getElementById('bgMusic');

    document.getElementById('keypad').addEventListener('click', (e) => {
        const key = e.target.innerText;
        if (!key) return;
        if (key === "DEL") input = input.slice(0, -1);
        else if (input.length < 6 && !isNaN(key)) input += key;

        dots.forEach((dot, i) => {
            if (i < input.length) dot.classList.add('active');
            else dot.classList.remove('active');
        });

        if (input === pin) {
            const overlay = document.getElementById('pin-overlay');
            overlay.style.transform = "translateY(-100%)";
            overlay.style.opacity = "0";
            setTimeout(() => {
                overlay.style.display = "none";
                document.getElementById('main-content').style.display = "block";
                setTimeout(() => document.getElementById('main-content').style.opacity = "1", 50);
                music.play().catch(() => {
                    document.body.addEventListener('touchstart', () => music.play(), {once: true});
                });
                startTimer();
                buildHeart();
            }, 800);
        } else if (input.length === 6) {
            input = "";
            dots.forEach(d => d.classList.remove('active'));
        }
    });

    function startTimer() {
        const jadian = new Date("February 5, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const d = now - jadian;
            const mo = Math.floor(d / 2629746000);
            const dy = Math.floor((d % 2629746000) / 86400000);
            const h = Math.floor((d % 86400000) / 3600000);
            const mi = Math.floor((d % 3600000) / 60000);
            const s = Math.floor((d % 60000) / 1000);
            // Penulisan Bulan utuh, gak disingkat
            document.getElementById('timer').innerText = `${mo} Bulan ${dy} Hari ${h}:${mi}:${s}`;
        }, 1000);
    }

    function buildHeart() {
        const frames = document.querySelectorAll('.photo-frame');
        frames.forEach((f, i) => {
            const a = (i / frames.length) * 2 * Math.PI;
            // Rumus parametric curve buat bentuk hati (Love)
            const x = 16 * Math.pow(Math.sin(a), 3) * 11; 
            const y = -(13 * Math.cos(a) - 5 * Math.cos(2*a) - 2 * Math.cos(3*a) - Math.cos(4*a)) * 11;
            f.style.transform = `translate3d(${x}px, ${y}px, ${Math.sin(a)*80}px) rotateY(${a*20}deg)`;
        });
    }
</script>
</body>
</html>
