<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XRexzob ❤️ Raisya</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('IMG-Foto-Gue.jpg') no-repeat center/cover;
  height: 100vh;
  overflow: hidden;
  color: white;
}

/* overlay tipis biar teks kebaca */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
}

/* HALAMAN */
.page {
  position: relative;
  z-index: 2;
  text-align: center;
  top: 50%;
  transform: translateY(-50%);
}

.hidden {
  display: none;
}

/* tombol kanan atas */
.top-btn {
  position: absolute;
  top: 15px;
  right: 15px;
  z-index: 3;
  background: #ff4d88;
  border: none;
  padding: 8px 14px;
  border-radius: 20px;
  color: white;
  cursor: pointer;
}

/* tombol musik */
.music-btn {
  margin-top: 15px;
  padding: 10px 18px;
  border: none;
  border-radius: 20px;
  background: #ff4d88;
  color: white;
  cursor: pointer;
}

/* TEXT */
h1 {
  color: #ff4d88;
}

.timer {
  margin: 15px 0;
  font-weight: bold;
}

/* LOVE HUJAN */
.love {
  position: absolute;
  color: #ff4d88;
  animation: jatuh linear infinite;
}

@keyframes jatuh {
  0% { transform: translateY(-10vh); opacity: 1; }
  100% { transform: translateY(110vh); opacity: 0; }
}

/* PESAN */
.pesan-box {
  max-width: 350px;
  margin: auto;
}
</style>
</head>

<body>

<!-- tombol pesan kanan atas -->
<button class="top-btn" onclick="showPesan()">💌 Pesan</button>

<!-- HALAMAN UTAMA -->
<div class="page" id="home">
  <h1>XRexzob ❤️ Raisya</h1>
  <p>Udah sejauh ini kita bareng:</p>
  <div class="timer" id="timer"></div>

  <button class="music-btn" onclick="playMusic()">🎵 Play Musik</button>
</div>

<!-- HALAMAN PESAN -->
<div class="page hidden" id="pesan">
  <div class="pesan-box">
    <h1>❤️</h1>
    <p>
      Dari awal kita kenal sampai sekarang...<br><br>
      Banyak hal yang udah kita lewatin bareng.<br><br>
      Kadang ketawa, kadang juga berantem,<br>
      tapi kita masih tetap di sini.<br><br>
      Aku cuma mau bilang...<br><br>
      <b>aku sayang kamu ❤️</b>
    </p>

    <button class="music-btn" onclick="backHome()">⬅️ Kembali</button>
  </div>
</div>

<audio id="musik" src="musikX.mp3"></audio>

<script>
// TIMER (GAK DIUBAH)
const startDate = new Date("2024-01-01 00:00:00").getTime();

function updateTimer() {
  const now = new Date().getTime();
  const diff = now - startDate;

  const hari = Math.floor(diff / (1000 * 60 * 60 * 24));
  const jam = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const menit = Math.floor((diff / (1000 * 60)) % 60);
  const detik = Math.floor((diff / 1000) % 60);

  document.getElementById("timer").innerHTML =
    hari + " Hari " + jam + " Jam " + menit + " Menit " + detik + " Detik";
}
setInterval(updateTimer, 1000);

// MUSIK
function playMusic() {
  document.getElementById("musik").play();
}

// NAV
function showPesan() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("pesan").classList.remove("hidden");
}

function backHome() {
  document.getElementById("pesan").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

// LOVE HUJAN
function createLove() {
  const love = document.createElement("div");
  love.classList.add("love");
  love.innerHTML = "❤️";
  love.style.left = Math.random() * 100 + "vw";
  love.style.fontSize = (Math.random() * 10 + 15) + "px";
  love.style.animationDuration = (Math.random() * 3 + 2) + "s";
  document.body.appendChild(love);

  setTimeout(() => {
    love.remove();
  }, 5000);
}
setInterval(createLove, 300);
</script>

</body>
</html>
