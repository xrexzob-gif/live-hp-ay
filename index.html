<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Raisya ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #ffeef2;
            background-image: url('IMG-Foto-Gue.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Layer pink lembut transparan */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 182, 193, 0.4); 
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            border-radius: 20px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.85); /* Putih bening */
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            width: 85%;
            max-width: 380px;
            text-align: center;
            border: 2px solid #fff;
        }

        h1 {
            font-size: 1.6rem;
            color: #d63384; /* Warna pink gelap */
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        #timer {
            font-size: 1rem;
            margin: 20px 0;
            color: #444;
            padding: 15px;
            border-radius: 15px;
            background: #fff;
            box-shadow: inset 0 0 10px rgba(255, 182, 193, 0.5);
            font-weight: bold;
        }

        .btn-music {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-music:active { transform: scale(0.95); }

        /* Efek Kelopak Bunga Sakura */
        .petal {
            position: absolute;
            top: -10px;
            color: #ffb7c5;
            user-select: none;
            z-index: 5;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(105vh) rotate(360deg); }
        }

        .footer {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <audio id="audioMp3" loop>
        <source src="musik.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div style="font-size: 40px; margin-bottom: 10px;">🌸</div>
        <h1>XREXZOB & RAISYA</h1>
        <p style="color: #666; font-size: 0.9rem;">Sudah sejauh ini kita melangkah:</p>
        
        <div id="timer">Menghitung cinta...</div>

        <p style="color: #d63384; font-size: 0.95rem; margin-top: 10px; line-height: 1.4;">
            "Gak perlu monitor layar kamu, aku cuma mau monitor kebahagiaan kamu."
        </p>

        <button class="btn-music" onclick="playMusic()">Dengerin Musiknya ✨</button>
        
        <div class="footer">Happy Anniversary, Sayang</div>
    </div>

    <script>
        const startDate = new Date("February 5, 2026 00:00:00").getTime();

        setInterval(function() {
            const now = new Date().getTime();
            const distance = now - startDate;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById("timer").innerHTML = days + " Hari " + hours + " Jam " + minutes + " Menit " + seconds + " Detik";
        }, 1000);

        function playMusic() { document.getElementById("audioMp3").play(); }

        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            petal.innerHTML = '🌸'; 
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.fontSize = Math.random() * 10 + 15 + 'px';
            petal.style.animationDuration = Math.random() * 5 + 3 + 's';
            petal.style.opacity = Math.random() * 0.7 + 0.3;
            document.body.appendChild(petal);
            setTimeout(() => { petal.remove(); }, 8000);
        }
        setInterval(createPetal, 300);
    </script>
</body>
</html>
