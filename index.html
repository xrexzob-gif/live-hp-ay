<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Book of Us | 05.02.2026</title>
    <style>
        /* Desain Background & Vibes */
        body { 
            background-color: #fdf2f8; /* Pink sangat lembut */
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Georgia', serif; /* Font klasik romantis */
            overflow: hidden;
        }

        /* Container Buku (Notebook) */
        .notebook {
            width: 330px;
            height: 520px;
            background: #fffef0; /* Warna kertas vintage */
            border-radius: 5px 20px 20px 5px;
            box-shadow: 15px 15px 30px rgba(0,0,0,0.1);
            position: relative;
            padding: 25px;
            border-left: 12px solid #5d4037; /* Jilidan buku cokelat tua */
            box-sizing: border-box;
        }

        /* Hiasan Ring Buku */
        .notebook::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 50px;
            width: 15px;
            height: 400px;
            background: repeating-linear-gradient(#bbb 0%, #bbb 5%, transparent 5%, transparent 10%);
        }

        /* Timer Jadian (Box Romantis) */
        .timer-box {
            background: #ffebee;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px dashed #e28e8e;
            margin-bottom: 25px;
        }
        .timer-title { font-size: 12px; color: #888; letter-spacing: 1px; }
        #timer { font-size: 18px; font-weight: bold; color: #d63031; margin-top: 5px; }

        /* Isi Playlist Hindia */
        .content {
            font-size: 14px;
            color: #555;
            line-height: 1.8;
            text-align: left;
        }
        .content h3 { margin: 0 0 15px 0; color: #a98467; font-size: 18px; text-align: center;}
        .content b { color: #d4a373; font-weight: normal; }
        .content .song-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }

        /* INI KUNCINYA: Tab Menonjol ala TikTok */
        .tabs-container {
            position: absolute;
            right: -35px; /* Menonjol keluar dari buku */
            top: 60px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .tab {
            width: 65px;
            height: 35px;
            color: white;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0 10px 10px 0;
            box-shadow: 3px 3px 8px rgba(0,0,0,0.1);
            transition: 0.3s;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .tab:hover { transform: translateX(10px); }

        /* Warna Tab Estetik (6-8-9, Tanpa 7) */
        .c1 { background-color: #8E9775; }
        .c2 { background-color: #E28E8E; }
        .c3 { background-color: #6D8299; }
        .c4 { background-color: #D4A373; }
        .c5 { background-color: #A98467; }
        .c6 { background-color: #BC8F8F; }
        .c8 { background-color: #52796F; } /* Loncat ke 8 */
        .c9 { background-color: #354F52; }

    </style>
</head>
<body>

    <div class="notebook">
        <div class="timer-box">
            <div class="timer-title">💖 KITA JADIAN SUDAH SELAMA:</div>
            <div id="timer">Menghitung...</div>
        </div>

        <div class="content">
            <h3>Hindia Playlist Kita 🎧</h3>
            <div class="song-item">01. <b>Evaluasi</b></div>
            <div class="song-item">02. <b>Secukupnya</b></div>
            <div class="song-item">03. <b>Rumah ke Rumah</b></div>
            <div class="song-item">04. <b>Besok Mungkin Kita Sampai</b></div>
            <div class="song-item">05. <b>Membasuh</b></div>
            <div class="song-item">06. <b>Apapun yang Terjadi</b></div>
            <div class="song-item">08. <b>Cincin</b></div>
            <div class="song-item">09. <b>Janji Palsu</b></div>
        </div>

        <div class="tabs-container">
            <a href="#" class="tab c1">01</a>
            <a href="#" class="tab c2">02</a>
            <a href="#" class="tab c3">03</a>
            <a href="#" class="tab c4">04</a>
            <a href="#" class="tab c5">05</a>
            <a href="#" class="tab c6">06</a>
            <a href="#" class="tab c8">08</a>
            <a href="#" class="tab c9">09</a>
        </div>
    </div>

    <script>
        const anniversaryDate = new Date("Feb 5, 2026 00:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const distance = now - anniversaryDate;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById("timer").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s";
        }, 1000);
    </script>

</body>
</html>
