<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu 💙</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:white;
  text-align:center;
  background:#020617;
  overflow:hidden;
}

/* 🤖 ROBOT */
.robot{
  position:fixed;
  font-size:30px;
  animation:float 6s infinite ease-in-out;
  opacity:0.7;
}

@keyframes float{
  0%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-20px) rotate(10deg);}
  100%{transform:translateY(0) rotate(0deg);}
}

/* posisi */
.r1{top:10%;left:10%;}
.r2{top:20%;left:80%;}
.r3{top:60%;left:20%;}
.r4{top:70%;left:70%;}
.r5{top:40%;left:50%;}
.r6{top:80%;left:10%;}
.r7{top:15%;left:40%;}
.r8{top:50%;left:85%;}

/* layout */
.wrapper{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:100%;
  max-width:380px;
  padding:20px;
}

/* card */
.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  backdrop-filter:blur(10px);
}

/* foto */
img{
  width:140px;
  border-radius:20px;
  margin-top:15px;
}

/* text */
h1{font-size:26px;}
h2{color:#60a5fa;font-size:14px;}

.heart{
  font-size:35px;
  animation:beat 1s infinite;
}

@keyframes beat{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

#days{
  margin-top:10px;
  font-size:13px;
  color:#93c5fd;
}

.box{
  margin-top:15px;
  padding:15px;
  border-radius:15px;
  background:#1e293b;
}

/* button */
button{
  margin-top:15px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
}

/* hidden */
#hidden{
  margin-top:15px;
  opacity:0;
  transition:1s;
}
.show{opacity:1;}
</style>
</head>

<body>

<!-- 🤖 ROBOT LUCU -->
<div class="robot r1">🤖</div>
<div class="robot r2">🤖</div>
<div class="robot r3">🤖</div>
<div class="robot r4">🤖</div>
<div class="robot r5">🤖</div>
<div class="robot r6">🤖</div>
<div class="robot r7">🤖</div>
<div class="robot r8">🤖</div>

<div class="wrapper">
<div class="container">

<div class="card">

<div class="heart">💙</div>

<h1>Untuk Kamu</h1>
<h2>05 Februari 2026</h2>

<img src="IMG-Foto-Gue.jpg">

<div id="days"></div>

<div class="box">
Hari itu bukan cuma tanggal biasa...<br>
Itu awal dari cerita kita 💙
</div>

<button onclick="start()">Klik ini 💌</button>

<div id="hidden">
Makasih udah ada 💙<br>
I love you
</div>

<audio id="music" loop>
  <source src="hindia.mp3">
</audio>

</div>

</div>
</div>

<script>

// 🔥 FIX TOTAL (MENIT + DETIK JALAN)
function updateDays(){
  const start = new Date("2026-02-05T00:00:00");
  const now = new Date().getTime();
  const diff = now - start.getTime();

  if(diff >= 0){
    const total = Math.floor(diff / 1000);

    const d = Math.floor(total / (3600*24));
    const h = Math.floor((total % (3600*24)) / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = total % 60;

    document.getElementById("days").innerText =
      `${d} hari ${h} jam ${m} menit ${s} detik bareng 💙`;
  } else {
    document.getElementById("days").innerText =
      "Menuju hari spesial 💙";
  }
}

setInterval(updateDays, 1000);
updateDays();

function start(){
  document.getElementById("hidden").classList.add("show");
  document.getElementById("music").play();
}

</script>

</body>
</html>
