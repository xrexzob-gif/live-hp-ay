<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XREXZOB & RAISA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;800&family=Quicksand:wght@700&family=Reenie+Beanie&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow: hidden; height: 100vh; width: 100%;
        }

        /* LAYAR PIN */
        #pin-overlay {
            position: fixed; inset: 0; background: #0a0a0a;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: 0.8s ease-out;
        }
        .pin-gif { 
            width: 80px; height: 80px; border-radius: 50%; 
            margin-bottom: 20px; object-fit: cover; 
            border: 2px solid rgba(255,182,193,0.3);
        }
        .pin-label { font-size: 0.7rem; letter-spacing: 3px; opacity: 0.6; margin-bottom: 25px; }
        .pin-dots { display: flex; gap: 12px; margin-bottom: 40px; }
        .dot { width: 10px; height: 10px; border: 1.5px solid #333; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: #ffb6c1; border-color: #ffb6c1; box-shadow: 0 0 10px #ffb6c1; transform: scale(1.2); }
        
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 210px; }
        .key {
            width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.03);
            display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.08); transition: 0.2s;
        }

        /* KONTEN UTAMA */
        #main-content { display: none; opacity: 0; transition: 2s; height: 100%; position: relative; width: 100%; z-index: 2; }
        #starCanvas { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #001220 0%, #000 100%); }

        /* TIMER */
        .timer-header { text-align: center; padding-top: 40px; height: 15vh; }
        #timer { font-family: 'Quicksand', sans-serif; font-size: 1rem; color: #fff; line-height: 1.6; }
        .timer-unit { color: #ffb6c1; font-weight: 800; font-size: 1.2rem; }

        /* GALLERY ORBIT */
        .gallery-container { 
            position: relative; height: 40vh; width: 100%; 
            display: flex; justify-content: center; align-items: center;
        }
        .center-frame {
            width: 100px; height: 100px; border-radius: 15px; border: 2.5px solid #fff;
            box-shadow: 0 0 25px rgba(255,255,255,0.3); overflow: hidden; z-index: 10;
        }
        .center-frame img { width: 100%; height: 100%; object-fit: cover; }

        .orbit-system {
            position: absolute; width: 280px; height: 280px;
            animation: rotateFull 20s linear infinite;
            display: flex; justify-content: center; align-items: center;
        }
        .photo-item {
            position: absolute; width: 60px; height: 80px;
            background: #fff; padding: 2px; border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: counterRotate 20s linear infinite;
        }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 3px; }

        .p1 { top: -40px; left: 110px; }
        .p2 { top: 10px; right: 10px; }
        .p3 { top: 100px; right: -40px; }
        .p4 { bottom: 10px; right: 10px; }
        .p5 { bottom: -40px; left: 110px; }
        .p6 { bottom: 10px; left: 10px; }
        .p7 { top: 100px; left: -40px; }
        .p8 { top: 10px; left: 10px; }

        @keyframes rotateFull { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes counterRotate { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }

        /* PESAN */
        .message-box { text-align: center; padding: 0 30px; margin-top: 20px; }
        .title-love { font-family: 'Reenie Beanie', cursive; font-size: 3rem; color: #ffb6c1; margin-bottom: 5px; }
        .text-love { font-size: 0.85rem; color: #ddd; line-height: 1.6; font-style: italic; }

        footer { position: absolute; bottom: 15px; width: 100%; text-align: center; font-size: 0.55rem; letter-spacing: 5px; opacity: 0.3; }
    </style>
</head>
<body>

<div id="pin-overlay">
    <img src="1.gif" class="pin-gif">
    <p class="pin-label">INPUT ACCESS CODE</p>
    <div class="pin-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="keypad" onclick="handleInput(event)">
        <div class="key">1</div><div class="key">2</div><div class="key">3</div>
        <div class="key">4</div><div class="key">5</div><div class="key">6</div>
        <div class="key">7</div><div class="key">8</div><div class="key">9</div>
        <div style="visibility:hidden"></div><div class="key">0</div><div class="key" style="font-size:0.6rem">DEL</div>
    </div>
</div>

<div id="main-content">
    <canvas id="starCanvas"></canvas>
    
    <div class="timer-header">
        <div id="timer">Menghitung kenangan...</div>
    </div>

    <div class="gallery-container">
        <div class="center-frame"><img src="2.gif"></div>
        <div class="orbit-system">
            <div class="photo-item p1"><img src="1.jpg"></div>
            <div class="photo-item p2"><img src="2.jpg"></div>
            <div class="photo-item p3"><img src="3.jpg"></div>
            <div class="photo-item p4"><img src="4.jpg"></div>
            <div class="photo-item p5"><img src="5.jpg"></div>
            <div class="photo-item p6"><img src="6.jpg"></div>
            <div class="photo-item p7"><img src="8.jpg"></div>
            <div class="photo-item p8"><img src="9.jpg"></div>
        </div>
    </div>

    <div class="message-box">
        <h2 class="title-love">Pesan</h2>
        <p class="text-love">
            "Aku menerima segala kurang dan lebihnya kamu, segala tawa dan air mata. Aku akan terus menjagamu di setiap langkahku. Terima kasih sudah mengizinkanku menjadi bagian dari duniamu."
        </p>
    </div>

    <footer>XREXZOB 2026</footer>
</div>

<audio id="msc" loop><source src="Bersamamu.mp3" type="audio/mpeg"></audio>

<script>
    let code = "";
    const pin = "050226"; 
    const dots = document.querySelectorAll('.dot');
    const music = document.getElementById('msc');
    
    function handleInput(e) {
        const v = e.target.innerText;
        if(!v) return;
        if(v === "DEL") code = code.slice(0, -1);
        else if(code.length < 6) code += v;
        dots.forEach((d, i) => i < code.length ? d.classList.add('active') : d.classList.remove('active'));
        if(code === pin) {
            document.getElementById('pin-overlay').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('pin-overlay').style.display = "none";
                document.getElementById('main-content').style.display = "block";
                setTimeout(() => {
                    document.getElementById('main-content').style.opacity = "1";
                    initStars(); startTimer(); music.play();
                }, 50);
            }, 800);
        } else if(code.length === 6) { code = ""; dots.forEach(d => d.classList.remove('active')); }
    }

    function startTimer() {
        const start = new Date("February 5, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = now - start;
            const mo = Math.floor(diff / 2629746000);
            const d = Math.floor((diff % 2629746000) / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('timer').innerHTML = 
                `<span class="timer-unit">${mo}</span> Bulan <span class="timer-unit">${d}</span> Hari<br>` +
                `<span class="timer-unit">${h}</span> Jam <span class="timer-unit">${m}</span> Menit <span class="timer-unit">${s}</span> Detik`;
        }, 1000);
    }

    function initStars() {
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const stars = [];
        const shootingStars = [];

        for(let i = 0; i < 80; i++) {
            stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1.5, v: Math.random()*0.3 });
        }

        function createShootingStar() {
            shootingStars.push({
                x: Math.random() * canvas.width,
                y: 0,
                len: Math.random() * 80 + 30,
                speed: Math.random() * 10 + 5,
                opacity: 1
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Background Stars
            ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
            stars.forEach(st => {
                ctx.beginPath(); ctx.arc(st.x, st.y, st.s, 0, Math.PI*2); ctx.fill();
                st.y += st.v; if(st.y > canvas.height) st.y = 0;
            });

            // Draw Shooting Stars (Bintang Jatuh)
            ctx.lineWidth = 2;
            shootingStars.forEach((ss, i) => {
                ctx.strokeStyle = `rgba(255, 255, 255, ${ss.opacity})`;
                ctx.beginPath();
                ctx.moveTo(ss.x, ss.y);
                ctx.lineTo(ss.x - ss.len, ss.y + ss.len);
                ctx.stroke();
                
                ss.x -= ss.speed;
                ss.y += ss.speed;
                ss.opacity -= 0.01;

                if (ss.opacity <= 0 || ss.y > canvas.height) {
                    shootingStars.splice(i, 1);
                }
            });

            if (Math.random() < 0.03) createShootingStar();
            requestAnimationFrame(draw);
        }
        draw();
    }
</script>
</body>
</html>
