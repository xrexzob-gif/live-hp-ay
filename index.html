<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xrexzob Heart Gallery | Together Forever</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Reenie+Beanie&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000; 
            overflow: hidden; 
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
        }

        /* INTRO SPEECH OVERLAY */
        #intro-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, transform 0.8s ease;
            text-align: center;
            cursor: pointer;
        }
        #intro-overlay img { width: 150px; margin-bottom: 20px; }
        #status-text { font-weight: 800; color: #fff; margin-bottom: 10px; text-shadow: 0 0 10px rgba(255,182,193,0.8); }

        .wave-container { display: none; justify-content: center; align-items: center; gap: 5px; height: 30px; margin-top: 20px; }
        .bar { width: 4px; height: 10px; background: #ffb6c1; border-radius: 10px; animation: wave 0.5s infinite alternate; }
        @keyframes wave { from { height: 10px; } to { height: 30px; } }

        .stars-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); }

        header { margin-top: 20px; margin-bottom: 20px; z-index: 5; text-align: center; position: absolute; top: 20px; }
        header h1 { font-size: 2.2rem; font-weight: 600; color: #fff; text-shadow: 0 0 10px rgba(255, 182, 193, 0.6); }

        /* CONTAINER LOVE 3D MUTER */
        .heart-stage {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            perspective: 1000px;
        }
        .heart-carousel {
            position: relative;
            width: 100px; height: 100px;
            transform-style: preserve-3d;
            animation: rotateLove 15s linear infinite;
        }
        @keyframes rotateLove {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .photo-frame {
            position: absolute;
            width: 100px; height: 130px;
            background: #fff; padding: 5px;
            box-shadow: 0 5px 15px rgba(255,182,193,0.4);
            border-radius: 4px;
            transform-origin: center;
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }

        /* TOMBOL AMPLOP CHAT */
        #chat-button {
            position: fixed; bottom: 25px; right: 25px;
            background: #ffb6c1; width: 60px; height: 60px; border-radius: 50%;
            display: none; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4);
            cursor: pointer; z-index: 10000;
        }
        #chat-button img { width: 30px; height: 30px; }
    </style>
</head>
<body>

<div id="intro-overlay" onclick="mulaiDengar()">
    <img src="3.gif" alt="Intro">
    <h2 id="status-text">Sebut PIN buat masuk! 🎤</h2>
    <div id="wave-visual" class="wave-container">
        <div class="bar"></div><div class="bar" style="animation-delay: 0.1s;"></div>
        <div class="bar" style="animation-delay: 0.2s;"></div><div class="bar" style="animation-delay: 0.3s;"></div>
    </div>
</div>

<div class="stars-bg"></div>
<header><h1>XREXZOB💅💞</h1></header>

<div class="heart-stage">
    <div class="heart-carousel" id="carousel">
        <div class="photo-frame"><img src="foto 1.jpg"></div>
        <div class="photo-frame"><img src="foto 2.jpg"></div>
        <div class="photo-frame"><img src="foto 3.jpg"></div>
        <div class="photo-frame"><img src="foto 4.jpg"></div>
        <div class="photo-frame"><img src="foto 5.jpg"></div>
        <div class="photo-frame"><img src="foto 6.jpg"></div>
        <div class="photo-frame"><img src="foto 7.jpg"></div>
        <div class="photo-frame"><img src="foto 8.jpg"></div>
        <div class="photo-frame"><img src="foto 9.jpg"></div>
        <div class="photo-frame"><img src="foto 10.jpg"></div>
        <div class="photo-frame"><img src="foto 11.jpg"></div>
    </div>
</div>

<div id="chat-button" onclick="Tawk_API.toggle()">
    <img src="https://cdn-icons-png.flaticon.com/512/646/646094.png" alt="Chat">
</div>

<audio id="bgMusic" loop><source src="hindia.mp3" type="audio/mpeg"></audio>

<script>
    const carousel = document.getElementById('carousel');
    const frames = carousel.querySelectorAll('.photo-frame');
    const intro = document.getElementById('intro-overlay');
    const statusText = document.getElementById('status-text');
    const music = document.getElementById('bgMusic');
    
    // Susun foto jadi bentuk Love
    frames.forEach((frame, i) => {
        const angle = (i / frames.length) * 2 * Math.PI;
        const x = 16 * Math.pow(Math.sin(angle), 3) * 12;
        const y = -(13 * Math.cos(angle) - 5 * Math.cos(2*angle) - 2 * Math.cos(3*angle) - Math.cos(4*angle)) * 12;
        frame.style.transform = `translate3d(${x}px, ${y}px, ${i * 2}px)`;
    });

    function mulaiDengar() {
        window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!window.SpeechRecognition) { startApp(); return; }
        const recognition = new SpeechRecognition();
        recognition.lang = 'id-ID';
        recognition.onstart = () => { 
            statusText.innerText = "Dengerin PIN..."; 
            document.getElementById('wave-visual').style.display = "flex";
        };
        recognition.onresult = (e) => {
            const hasil = e.results[0][0].transcript.replace(/\s+/g, '');
            // PIN BARU: 050226
            if (hasil.includes("050226") || hasil.includes("kosonglima")) {
                startApp();
            } else {
                statusText.innerText = "PIN Salah! Coba lagi.";
            }
        };
        recognition.start();
    }

    function startApp() {
        music.play();
        intro.style.opacity = "0";
        setTimeout(() => { 
            intro.style.display = "none"; 
            document.getElementById('chat-button').style.display = 'flex';
        }, 800);
    }
</script>

<script type="text/javascript">
var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
Tawk_API.onLoad = function(){ Tawk_API.hideWidget(); };

var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
s1.async=true;
s1.src='https://embed.tawk.to/662a2656a0d6737bd448206d/1hsal7f3g';
s1.charset='UTF-8';
s1.setAttribute('crossorigin','*');
s0.parentNode.insertBefore(s1,s0);
})();
</script>

</body>
</html>
