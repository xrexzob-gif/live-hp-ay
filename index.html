<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love Journey ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --love: #ff4b2b; --pink: #fff5f7; }
        body, html { margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; background-color: var(--pink); overflow-x: hidden; }

        /* Intro Page */
        #intro {
            height: 100vh; width: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white; position: fixed; top: 0; z-index: 9999; transition: 1s ease-in-out;
        }

        .btn-start {
            padding: 15px 40px; font-size: 1.2rem; background: white; color: #ff758c;
            border: none; border-radius: 50px; cursor: pointer; font-weight: 700;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); margin-top: 20px;
        }

        /* Main Content */
        #main-web { display: none; opacity: 0; transition: 2s ease; padding-bottom: 100px; text-align: center; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: var(--love); margin-top: 50px; }

        /* Timer */
        .timer { display: flex; justify-content: center; gap: 10px; margin: 30px 0; flex-wrap: wrap; }
        .box { background: white; padding: 15px; border-radius: 15px; min-width: 70px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .box span { display: block; font-size: 2rem; font-weight: 700; color: var(--love); }
        .box label { font-size: 0.7rem; color: #888; }

        /* Gallery */
        .gallery { position: relative; max-width: 500px; margin: 50px auto; height: 1600px; }
        .polaroid {
            position: absolute; background: white; padding: 10px 10px 30px 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 220px; transition: 0.4s;
        }
        .polaroid img { width: 100%; height: 220px; object-fit: cover; background: #eee; }

        /* Positions */
        .p1 { top: 0; left: 5%; transform: rotate(-5deg); }
        .p2 { top: 60px; right: 5%; transform: rotate(5deg); }
        .p3 { top: 350px; left: 10%; transform: rotate(7deg); }
        .p4 { top: 410px; right: 5%; transform: rotate(-8deg); }
        .p5 { top: 700px; left: 5%; transform: rotate(-5deg); }
        .p6 { top: 760px; right: 10%; transform: rotate(10deg); }
        .p8 { top: 1050px; left: 10%; transform: rotate(-3deg); }
        .p9 { top: 1100px; right: 5%; transform: rotate(6deg); }

        .heart { position: fixed; color: var(--love); animation: fly 4s linear infinite; z-index: 998; }
        @keyframes fly { 0% { transform: translateY(100vh); opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }
        .quote { font-style: italic; font-size: 1.1rem; color: #555; padding: 20px; line-height: 1.6; }
    </style>
</head>
<body>

    <audio id="lagu" loop>
        <source src="hindia.mp3" type="audio/mpeg">
    </audio>

    <div id="intro">
        <h1>Halo Cantik... ❤️</h1>
        <button class="btn-start" onclick="nyalakan()">Perjalanan Kita Dimulai</button>
    </div>

    <div id="main-web">
        <h1>Our Story</h1>
        <div class="timer">
            <div class="box"><span id="m">0</span><label>Bulan</label></div>
            <div class="box"><span id="d">0</span><label>Hari</label></div>
            <div class="box"><span id="h">0</span><label>Jam</label></div>
            <div class="box"><span id="min">0</span><label>Menit</label></div>
        </div>

        <div class="quote">"Terima kasih sudah bertahan sejauh ini bersamaku. Kamu adalah bagian terbaik dalam hidupku."</div>

        <div class="gallery">
            <div class="polaroid p1"><img src="./1.jpg"></div>
            <div class="polaroid p2"><img src="./2.jpg"></div>
            <div class="polaroid p3"><img src="./3.jpg"></div>
            <div class="polaroid p4"><img src="./4.jpg"></div>
            <div class="polaroid p5"><img src="./5.jpg"></div>
            <div class="polaroid p6"><img src="./6.jpg"></div>
            <div class="polaroid p8"><img src="./8.jpg"></div>
            <div class="polaroid p9"><img src="./9.jpg"></div>
        </div>

        <footer>Mencintaimu Selamanya ❤️</footer>
    </div>

    <script>
        function nyalakan() {
            var audio = document.getElementById("lagu");
            audio.play().catch(function(error) {
                console.log("Browser block audio, trying again...");
            });

            document.getElementById("intro").style.transform = "translateY(-100%)";
            document.getElementById("main-web").style.display = "block";
            setTimeout(() => { document.getElementById("main-web").style.opacity = "1"; }, 100);

            setInterval(updateWaktu, 1000);
            setInterval(createHeart, 500);
        }

        const tgl = new Date("February 5, 2026 00:00:00").getTime();
        function updateWaktu() {
            const now = new Date().getTime();
            const diff = now - tgl;
            const msD = 24 * 60 * 60 * 1000;
            document.getElementById('m').innerText = Math.floor(diff / (30.44 * msD));
            document.getElementById('d').innerText = Math.floor((diff % (30.44 * msD)) / msD);
            document.getElementById('h').innerText = Math.floor((diff % msD) / (1000 * 60 * 60));
            document.getElementById('min').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        }

        function createHeart() {
            const h = document.createElement("div");
            h.classList.add("heart"); h.innerHTML = "❤️";
            h.style.left = Math.random() * 100 + "vw";
            h.style.animationDuration = (Math.random() * 2 + 2) + "s";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 4000);
        }
    </script>
</body>
</html>
