<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xrexzob & Raisa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&family=Quicksand:wght@300;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; }

        /* LAYAR PIN MINIMALIS */
        #pin-overlay {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .pin-gif-top { width: 70px; height: 70px; border-radius: 50%; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.3); object-fit: cover; } /* */
        .pin-dots { display: flex; gap: 12px; margin-bottom: 30px; }
        .dot { width: 10px; height: 10px; border: 1px solid #fff; border-radius: 50%; }
        .dot.active { background: #fff; box-shadow: 0 0 10px #fff; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 210px; }
        .key {
            width: 55px; height: 55px; border-radius: 50%; background: rgba(255,255,255,0.05);
            display: flex; justify-content: center; align-items: center; font-size: 1.1rem; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.2s;
        }

        /* KONTEN UTAMA */
        #main-content { display: none; opacity: 0; transition: 2s; height: 100%; position: relative; }
        
        /* EFEK BINTANG JATUH */
        .night { position: absolute; width: 100%; height: 100%; z-index: -1; }
        .shooting_star {
            position: absolute; left: 50%; top: 50%; height: 2px;
            background: linear-gradient(-45deg, #5f91ff, rgba(0, 0, 255, 0));
            border-radius: 999px; filter: drop-shadow(0 0 6px #699bff);
            animation: tail 3000ms ease-in-out infinite, shooting 3000ms ease-in-out infinite;
        }
        @keyframes tail { 0% { width: 0; } 30% { width: 100px; } 100% { width: 0; } }
        @keyframes shooting { 0% { transform: translateX(0); } 100% { transform: translateX(300px); } }

        /* TIMER PELANGI GERAK */
        .timer-container { text-align: center; padding-top: 40px; margin-bottom: 20px; }
        #timer {
            font-size: 1.5rem; font-weight: 800;
            background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8f00ff);
            background-size: 400% 400%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: rainbow 8s ease infinite;
        }
        @keyframes rainbow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* GALLERY MELAYANG (BUKAN MUTER) */
        .gallery { position: relative; height: 50vh; width: 100%; perspective: 1000px; }
        .center-gif {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 130px; height: 130px; border-radius: 20px; border: 2px solid #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.2); z-index: 10; object-fit: cover;
        } /* */

        .floating-img {
            position: absolute; width: 80px; height: 100px; border-radius: 8px;
            background: #fff; padding: 3px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: float 6s ease-in-out infinite;
        }
        .floating-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 5px; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* PESAN BARU */
        .message { padding: 20px; text-align: center; font-style: italic; font-size: 0.95rem; line-height: 1.6; color: #ddd; }
        
        footer { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 0.6rem; letter-spacing: 5px; opacity: 0.4; }
    </style>
</head>
<body>

<div id="pin-overlay">
    <img src="1.gif" class="pin-gif-top"> <div class="pin-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="keypad" onclick="press(event)">
        <div class="key">1</div><div class="key">2</div><div class="key">3</div>
        <div class="key">4</div><div class="key">5</div><div class="key">6</div>
        <div class="key">7</div><div class="key">8</div><div class="key">9</div>
        <div></div><div class="key">0</div><div class="key" style="font-size:0.5rem">DEL</div>
    </div>
</div>

<div id="main-content">
    <div class="night">
        <div class="shooting_star"></div><div class="shooting_star"></div>
        <div class="shooting_star"></div><div class="shooting_star"></div>
    </div>

    <div class="timer-container">
        <div id="timer">00bln 00hr 00:00:00</div>
    </div>

    <div class="gallery" id="gal">
        <img src="2.gif" class="center-gif"> <div class="floating-img" style="top:10%; left:10%; animation-delay: 0s;"><img src="1.jpg"></div>
        <div class="floating-img" style="top:60%; left:15%; animation-delay: 1s;"><img src="2.jpg"></div>
        <div class="floating-img" style="top:15%; right:10%; animation-delay: 2s;"><img src="3.jpg"></div>
        <div class="floating-img" style="top:65%; right:15%; animation-delay: 3s;"><img src="4.jpg"></div>
        <div class="floating-img" style="top:5%; left:40%; animation-delay: 4s;"><img src="5.jpg"></div>
    </div>

    <div class="message">
        "Gue bakal terus nunggu di sini, karena gue udah nerima semua kurang dan lebihnya lo. Janji ya, tetep sama Raisa?" </div>

    <footer>XREXZOB 2026</footer> </div>

<audio id="msc" loop><source src="Bersamamu.mp3" type="audio/mpeg"></audio> <script>
    let p = "";
    const dots = document.querySelectorAll('.dot');
    
    function press(e) {
        const v = e.target.innerText;
        if(!v) return;
        if(v === "DEL") p = p.slice(0, -1);
        else if(p.length < 6) p += v;

        dots.forEach((d, i) => i < p.length ? d.classList.add('active') : d.classList.remove('active'));

        if(p === "050226") { //
            document.getElementById('pin-overlay').style.opacity = "0";
            document.getElementById('pin-overlay').style.transform = "scale(1.2)";
            setTimeout(() => {
                document.getElementById('pin-overlay').style.display = "none";
                document.getElementById('main-content').style.display = "block";
                setTimeout(() => document.getElementById('main-content').style.opacity = "1", 100);
                document.getElementById('msc').play();
                start();
            }, 800);
        } else if(p.length === 6) { p = ""; dots.forEach(d => d.classList.remove('active')); }
    }

    function start() {
        const start = new Date("February 5, 2026 00:00:00").getTime(); //
        setInterval(() => {
            const now = new Date().getTime();
            const diff = now - start;
            const mo = Math.floor(diff / 2629746000);
            const d = Math.floor((diff % 2629746000) / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('timer').innerText = `${mo}bln ${d}hr ${h}:${m}:${s}`;
        }, 1000);
    }
</script>
</body>
</html>
