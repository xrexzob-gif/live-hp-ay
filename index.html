<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XRexzob ❤️ Raisya</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: #000;
  overflow: hidden;
}

/* BACKGROUND */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('IMG-Foto-Gue.jpg') center/cover no-repeat;
  filter: blur(8px) brightness(0.5);
  transform: scale(1.1);
}

/* GLOW */
.glow {
  position: absolute;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, #ff4d88, transparent);
  filter: blur(120px);
  animation: moveGlow 6s infinite alternate;
}

@keyframes moveGlow {
  0% { top: 10%; left: 10%; }
  100% { top: 60%; left: 70%; }
}

/* CARD */
.card {
  position: relative;
  z-index: 2;
  margin: auto;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  width: 90%;
  max-width: 350px;
  color: white;
  box-shadow: 0 0 25px rgba(255, 77, 136, 0.4);
  animation: fadeIn 2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(-50%); }
}

h1 {
  color: #ff4d88;
}

.timer {
  margin: 15px 0;
  font-weight: bold;
}

.quote {
  color: #ff99cc;
  font-size: 14px;
}

/* BUTTON */
.btn {
  margin-top: 15px;
  background: linear-gradient(45deg, #ff4d88, #ff99cc);
  border: none;
  padding: 10px 18px;
  border-radius: 20px;
  color: white;
  cursor: pointer;
}

/* POPUP PESAN */
.popup {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(0,0,0,0.8);
  color: white;
  padding: 15px;
  border-radius: 15px;
  max-width: 250px;
  display: none;
  animation: fadeIn 0.5s;
}

.close {
  margin-top: 10px;
  display: block;
  text-align: right;
  cursor: pointer;
  color: #ff4d88;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="glow"></div>

<div class="card">
  <h1>XRexzob ❤️ Raisya</h1>
  <p>Udah sejauh ini kita bareng:</p>
  <div class="timer" id="timer"></div>

  <p class="quote">
    "Aku gak butuh yang sempurna, aku cuma butuh kamu yang selalu ada ❤️"
  </p>

  <button class="btn" onclick="openMsg()">Pesan 💌</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div id="isiPesan"></div>
  <span class="close" onclick="closeMsg()">tutup</span>
</div>

<!-- MUSIK -->
<audio id="musik" autoplay loop>
  <source src="musikX.mp3" type="audio/mpeg">
</audio>

<script>
// TANGGAL JADIAN (GANTI)
const startDate = new Date("2024-01-01 00:00:00").getTime();

function updateTimer() {
  const now = new Date().getTime();
  const diff = now - startDate;

  const hari = Math.floor(diff / (1000 * 60 * 60 * 24));
  const jam = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const menit = Math.floor((diff / (1000 * 60)) % 60);
  const detik = Math.floor((diff / 1000) % 60);

  document.getElementById("timer").innerHTML =
    hari + " Hari " + jam + " Jam " + menit + " Menit " + detik + " Detik";
}
setInterval(updateTimer, 1000);

// PESAN ROMANTIS
function openMsg() {
  const now = new Date().getTime();
  const diff = now - startDate;
  const hari = Math.floor(diff / (1000 * 60 * 60 * 24));

  document.getElementById("isiPesan").innerHTML =
    "Udah " + hari + " hari kita bareng...<br><br>" +
    "Dari awal yang cuma sekedar kenal,<br>" +
    "sampai sekarang jadi orang yang paling aku sayang ❤️<br><br>" +
    "Waktu terus jalan, tapi satu hal yang gak berubah...<br>" +
    "<b>perasaan aku ke kamu.</b><br><br>" +
    "Makasih ya udah bertahan sejauh ini 🤍";

  document.getElementById("popup").style.display = "block";
}

function closeMsg() {
  document.getElementById("popup").style.display = "none";
}

// AUTO PLAY FIX HP
window.addEventListener("click", () => {
  document.getElementById("musik").play();
});
</script>

</body>
</html>
