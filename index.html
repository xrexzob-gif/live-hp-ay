<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XREXZOB & RAISA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;800&family=Quicksand:wght@700&family=Reenie+Beanie&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow: hidden; height: 100vh; width: 100%;
        }

        /* PIN OVERLAY */
        #pin-overlay {
            position: fixed; inset: 0; background: #050505;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: 1s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .pin-gif { width: 70px; height: 70px; border-radius: 50%; margin-bottom: 20px; object-fit: cover; border: 2px solid rgba(255,255,255,0.2); }
        .pin-label { font-size: 0.65rem; letter-spacing: 3px; opacity: 0.6; margin-bottom: 25px; }
        .pin-dots { display: flex; gap: 12px; margin-bottom: 40px; }
        .dot { width: 10px; height: 10px; border: 1.5px solid #444; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: #ffb6c1; border-color: #ffb6c1; box-shadow: 0 0 10px #ffb6c1; transform: scale(1.2); }
        
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 210px; }
        .key {
            width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.03);
            display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.08); transition: 0.15s;
        }
        .key:active { background: rgba(255,255,255,0.2); transform: scale(0.9); }

        /* MAIN CONTENT */
        #main-content { display: none; opacity: 0; transition: 2s; height: 100%; position: relative; width: 100%; z-index: 2; }
        #starCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #001220 0%, #000000 100%); }

        /* TIMER */
        .timer-header { text-align: center; padding-top: 40px; width: 100%; z-index: 10; }
        #timer {
            font-family: 'Quicksand', sans-serif; font-size: 1rem; font-weight: 700;
            color: #fff; line-height: 1.5;
        }
        .timer-unit { color: #ffb6c1; font-weight: 800; font-size: 1.2rem; }

        /* GALLERY ORBIT (TEGAK) */
        .gallery-container { 
            position: relative; height: 45vh; width: 100%; 
            display: flex; justify-content: center; align-items: center;
        }
        
        .center-frame {
            width: 100px; height: 100px; border-radius: 15px; border: 2.5px solid #fff;
            box-shadow: 0 0 25px rgba(255,255,255,0.3); overflow: hidden; z-index: 10;
        }
        .center-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* Wrapper Putar Utama */
        .orbit-wrapper {
            position: absolute; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            animation: rotateOrbit 20s linear infinite;
        }

        .photo-orbit {
            position: absolute; width: 65px; height: 85px; border-radius: 5px;
            background: #fff; padding: 2px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            /* Counter-rotation: membuat foto tetap tegak */
            animation: counterRotate 20s linear infinite;
        }
        .photo-orbit img { width: 100%; height: 100%; object-fit: cover; border-radius: 3px; }

        @keyframes rotateOrbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Animasi penyeimbang agar foto tidak ikut miring */
        @keyframes counterRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        /* Penempatan foto di sekeliling lingkaran */
        .p1 { transform: translate(0, -135px); }
        .p2 { transform: translate(95px, -95px); }
        .p3 { transform: translate(135px, 0); }
        .p4 { transform: translate(95px, 95px); }
        .p5 { transform: translate(0, 135px); }
        .p6 { transform: translate(-95px, 95px); }
        .p7 { transform: translate(-135px, 0); }
        .p8 { transform: translate(-95px, -95px); }

        /* TEXT BOX */
        .message-box { text-align: center; padding: 0 35px; margin-top: 10px; }
        .title-love { font-family: 'Reenie Beanie', cursive; font-size: 3rem; color: #ffb6c1; margin-bottom: 5px; }
        .text-love { font-size: 0.85rem; color: #ddd; line-height: 1.6; font-style: italic; }

        footer { position: absolute; bottom: 15px; width: 100%; text-align: center; font-size: 0.6rem; letter-spacing: 5px; opacity: 0.4; }
    </style>
</head>
<body>

<div id="pin-overlay">
    <img src="1.gif" class="pin-gif">
    <p class="pin-label">MASUKKAN KODE AKSES</p>
    <div class="pin-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="keypad" onclick="handleInput(event)">
        <div class="key">1</div><div class="key">2</div><div class="key">3</div>
        <div class="key">4</div><div class="key">5</div><div class="key">6</div>
        <div class="key">7</div><div class="key">8</div><div class="key">9</div>
        <div style="visibility:hidden"></div><div class="key">0</div><div class="key" style="font-size:0.6rem">DEL</div>
    </div>
</div>

<div id="main-content">
    <canvas id="starCanvas"></canvas>
    
    <div class="timer-header">
        <div id="timer">Memulai Kenangan...</div>
    </div>

    <div class="gallery-container">
        <div class="center-frame"><img src="2.gif"></div>
        
        <div class="orbit-wrapper">
            <div class="photo-orbit p1"><img src="1.jpg"></div>
            <div class="photo-orbit p2"><img src="2.jpg"></div>
            <div class="photo-orbit p3"><img src="3.jpg"></div>
            <div class="photo-orbit p4"><img src="4.jpg"></div>
            <div class="photo-orbit p5"><img src="5.jpg"></div>
            <div class="photo-orbit p6"><img src="6.jpg"></div>
            <div class="photo-orbit p7"><img src="8.jpg"></div>
            <div class="photo-orbit p8"><img src="9.jpg"></div>
        </div>
    </div>

    <div class="message-box">
        <h2 class="title-love">Pesan</h2>
        <p class="text-love">
            "Aku menerima segala kurang dan lebihnya kamu, segala tawa dan air mata. Aku akan terus menjagamu di setiap langkahku. Terima kasih sudah mengizinkanku menjadi bagian dari duniamu."
        </p>
    </div>

    <footer>XREXZOB 2026</footer>
</div>

<audio id="msc" loop><source src="Bersamamu.mp3" type="audio/mpeg"></audio>

<script>
    let code = "";
    const pin = "050226"; 
    const dots = document.querySelectorAll('.dot');
    const music = document.getElementById('msc');
    
    function handleInput(e) {
        const v = e.target.innerText;
        if(!v) return;
        if(v === "DEL") code = code.slice(0, -1);
        else if(code.length < 6) code += v;

        dots.forEach((d, i) => i < code.length ? d.classList.add('active') : d.classList.remove('active'));

        if(code === pin) {
            document.getElementById('pin-overlay').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('pin-overlay').style.display = "none";
                document.getElementById('main-content').style.display = "block";
                setTimeout(() => {
                    document.getElementById('main-content').style.opacity = "1";
                    initStars();
                    startTimer();
                    music.play();
                }, 50);
            }, 1000);
        } else if(code.length === 6) { 
            code = ""; 
            dots.forEach(d => { d.classList.remove('active'); });
        }
    }

    function startTimer() {
        const start = new Date("February 5, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = now - start;
            
            const mo = Math.floor(diff / 2629746000);
            const d = Math.floor((diff % 2629746000) / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            
            document.getElementById('timer').innerHTML = 
                `<span class="timer-unit">${mo}</span> Bulan <span class="timer-unit">${d}</span> Hari<br>` +
                `<span class="timer-unit">${h}</span> Jam <span class="timer-unit">${m}</span> Menit <span class="timer-unit">${s}</span> Detik`;
        }, 1000);
    }

    function initStars() {
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const stars = [];
        for(let i = 0; i < 80; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.4 + 0.1
            });
        }

        const falls = [];
        function createFall() {
            falls.push({
                x: Math.random() * canvas.width,
                y: -10,
                len: Math.random() * 40 + 20,
                speed: Math.random() * 8 + 4
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
                s.y += s.speed;
                if(s.y > canvas.height) s.y = 0;
            });

            ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
            ctx.lineWidth = 1;
            falls.forEach((f, i) => {
                ctx.beginPath();
                ctx.moveTo(f.x, f.y);
                ctx.lineTo(f.x - f.len/2, f.y + f.len);
                ctx.stroke();
                f.x -= f.speed/2;
                f.y += f.speed;
                if(f.y > canvas.height) falls.splice(i, 1);
            });

            if(Math.random() < 0.04) createFall();
            requestAnimationFrame(draw);
        }
        draw();
    }
</script>
</body>
</html>
