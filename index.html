<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Raisya Tersayang ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #ffeef2;
            /* Memanggil foto kamu */
            background-image: url('IMG-Foto-Gue.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Overlay Pink Lembut biar foto makin estetik */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 182, 193, 0.3); 
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            border-radius: 25px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
            width: 85%;
            max-width: 350px;
            text-align: center;
            border: 2px solid #fff;
        }

        h1 {
            font-size: 1.5rem;
            color: #d63384;
            margin-bottom: 5px;
        }

        #timer {
            font-size: 0.95rem;
            margin: 15px 0;
            color: #444;
            padding: 12px;
            border-radius: 15px;
            background: #fff;
            box-shadow: inset 0 0 10px rgba(255, 182, 193, 0.3);
            font-weight: bold;
        }

        .btn-music {
            background: linear-gradient(45deg, #ff758c, #ff7eb3);
            color: #fff;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4);
        }

        /* Gaya Kelopak Bunga Sakura */
        .petal {
            position: absolute;
            top: -10px;
            color: #ffb7c5;
            user-select: none;
            z-index: 5;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(105vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <audio id="audioMp3" loop>
        <source src="musik%20x.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div style="font-size: 40px; margin-bottom: 5px;">🌸</div>
        <h1>XREXZOB & RAISYA</h1>
        <p style="color: #888; font-size: 0.8rem;">Sudah sejauh ini kita melangkah:</p>
        
        <div id="timer">Loading...</div>

        <p style="color: #d63384; font-size: 0.9rem; margin-top: 10px; font-weight: 500;">
            "Gak perlu monitor layar kamu, aku cuma mau monitor kebahagiaan kamu."
        </p>

        <button class="btn-music" onclick="playMusic()">Dengerin Musiknya ✨</button>
        <p style="font-size: 0.7rem; color: #aaa; margin-top: 15px;">Happy Anniversary ❤️</p>
    </div>

    <script>
        // Timer Jadian: 5 Feb 2026
        const startDate = new Date("February 5, 2026 00:00:00").getTime();

        setInterval(function() {
            const now = new Date().getTime();
            const distance = now - startDate;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById("timer").innerHTML = days + " Hari " + hours + " Jam " + minutes + " Menit " + seconds + " Detik";
        }, 1000);

        function playMusic() {
            document.getElementById("audioMp3").play();
        }

        // Efek Kelopak Sakura
        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            petal.innerHTML = '🌸'; 
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.fontSize = Math.random() * 10 + 15 + 'px';
            petal.style.animationDuration = Math.random() * 5 + 3 + 's';
            petal.style.opacity = Math.random() * 0.7 + 0.3;
            document.body.appendChild(petal);
            setTimeout(() => { petal.remove(); }, 8000);
        }
        setInterval(createPetal, 300);
    </script>
</body>
</html>
