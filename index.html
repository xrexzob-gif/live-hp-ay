<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anniversary - XreXzob & Raisya</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'sans-serif'; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* MANGGIL WALLPAPER DARI GITHUB LO */
            background: url('IMG-Foto-Gue.jpg') no-repeat center center;
            background-size: cover;
            overflow: hidden;
            position: relative;
        }

        /* PELANGI GERAK DI BELAKANG CARD (LEBIH JELAS) */
        .rainbow-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50vh; /* Setengah layar atas */
            background: linear-gradient(120deg, 
                rgba(255,0,0,0.15), 
                rgba(255,165,0,0.15), 
                rgba(255,255,0,0.15), 
                rgba(0,128,0,0.15), 
                rgba(0,0,255,0.15), 
                rgba(75,0,130,0.15), 
                rgba(238,130,238,0.15));
            background-size: 300% 300%;
            animation: moveRainbow 6s linear infinite; /* Gerak lebih cepet */
            z-index: 2; /* Di atas foto, di bawah card */
            filter: blur(15px); /* Biar smooth */
        }

        @keyframes moveRainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        /* FITUR PESAN KANAN ATAS */
        .fitur-pesan {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.3);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 11px;
            color: #fff;
            cursor: pointer;
            backdrop-filter: blur(8px);
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.4);
        }

        /* CARD UTAMA (Sesuai Foto) */
        .container {
            background: rgba(255, 255, 255, 0.85);
            width: 85%;
            max-width: 380px;
            padding: 40px 20px;
            border-radius: 40px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .flower-top { font-size: 35px; margin-bottom: 10px; }

        h2 { 
            color: #d63384; 
            font-size: 22px; 
            font-weight: bold; 
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        
        .sub-title { color: #888; font-size: 13px; margin-bottom: 25px; }

        /* BOX TIMER PUTIH (Sesuai Foto) */
        .timer-display {
            background: #fff;
            padding: 15px;
            border-radius: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 25px;
            font-size: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .quote-text { 
            color: #d63384; 
            font-size: 13px; 
            margin-bottom: 25px; 
            line-height: 1.5;
        }

        /* TOMBOL MUSIK PINK (Sesuai Foto) */
        .btn-play {
            background: linear-gradient(to right, #ff7ba0, #ff5e8e);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 35px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 94, 142, 0.4);
        }

        .happy-anniv { font-size: 11px; color: #aaa; margin-top: 20px; }

        /* EFEK JATUH CAMPUR (LOVE & SAKURA) */
        .falling {
            position: fixed;
            top: -10%;
            z-index: 5;
            animation: fall linear forwards;
            pointer-events: none;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="rainbow-bg"></div>

    <div class="fitur-pesan" onclick="tampilQuotes()">Pesan Untukmu ✨</div>

    <div class="container">
        <div class="flower-top">🌸</div>
        <h2>XREXZOB & RAISYA</h2>
        <p class="sub-title">Sudah sejauh ini kita melangkah:</p>

        <div class="timer-display" id="running-timer">Memuat Waktu...</div>

        <p class="quote-text">"Gak perlu monitor layar kamu, aku cuma mau monitor kebahagiaan kamu."</p>

        <button class="btn-play" onclick="gasMusik()">Dengerin Musiknya ✨</button>
        
        <p class="happy-anniv">Happy Anniversary ❤️</p>
    </div>

    <audio id="audioX" loop>
        <source src="musik x.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- 1. SET TANGGAL AWAL (SINKRON SAMA FOTO LO) ---
        // Kita set ke tanggal 5 Februari 2026 jam 00:00:00
        // Ini bakal ngepasin sama itungan 43 Hari di tgl 20 Maret jam 1 siang.
        const dateStart = new Date("2026-02-05T00:00:00").getTime();

        function startTimer() {
            const now = new Date().getTime();
            const gap = now - dateStart;

            const d = Math.floor(gap / (1000 * 60 * 60 * 24));
            const h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((gap % (1000 * 60)) / 1000);

            document.getElementById("running-timer").innerHTML = 
                `${d} Hari ${h} Jam ${m} Menit ${s} Detik`;
        }
        setInterval(startTimer, 1000); // Update tiap detik
        startTimer();

        // --- 2. FUNGSI MUSIK ---
        function gasMusik() {
            const audio = document.getElementById("audioX");
            audio.play();
            alert("Musik X diputar! Enjoy ✨");
        }

        // --- 3. FITUR PESAN KANAN ATAS ---
        function tampilQuotes() {
            const pesan = [
                "I Love You More Than Anything! ❤️",
                "Bahagia terus bareng aku ya! ✨",
                "Makasih udah bertahan sejauh ini. 🌸",
                "You're my favorite person! 😊"
            ];
            alert(pesan[Math.floor(Math.random() * pesan.length)]);
        }

        // --- 4. EFEK JATUH CAMPUR (LOVE & SAKURA) ---
        function spawnFallingEffect() {
            const symbols = ["🌸", "❤️", "💖"];
            const symbol = symbols[Math.floor(Math.random() * symbols.length)];
            const item = document.createElement('div');
            item.classList.add('falling');
            item.innerHTML = symbol; 
            item.style.left = Math.random() * 100 + "vw";
            item.style.fontSize = Math.random() * 15 + 10 + "px";
            item.style.animationDuration = Math.random() * 3 + 3 + "s";
            item.style.color = (symbol !== "🌸") ? "#ff4d4d" : "#fff"; // Warna merah buat Love
            item.style.opacity = Math.random(); // Opacity random
            document.body.appendChild(item);
            setTimeout(() => { item.remove(); }, 6000);
        }
        setInterval(spawnFallingEffect, 300); // Kecepatan spawn
    </script>
</body>
</html>
