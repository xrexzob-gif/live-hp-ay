<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saturn Photo Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #0a0a23 0%, #000 70%);
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .saturn-container {
            position: relative;
            width: 800px;
            height: 800px;
            transform-style: preserve-3d;
            animation: rotate 60s linear infinite;
        }

        .saturn-planet {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle at 30% 30%, #f4d03f, #e67e22, #d68910, #b7950b);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 
                inset -20px -20px 50px rgba(0,0,0,0.5),
                0 0 100px rgba(244, 208, 63, 0.3);
            z-index: 10;
        }

        .saturn-rings {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(70deg);
            width: 600px;
            height: 600px;
            border: 40px solid transparent;
            border-image: linear-gradient(90deg, transparent 30%, rgba(200,150,100,0.6) 50%, transparent 70%) 1;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(150,100,50,0.3);
            z-index: 5;
        }

        .photo-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(75deg);
            width: 700px;
            height: 700px;
            border-radius: 50%;
        }

        .photo {
            position: absolute;
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 3px solid rgba(255,255,255,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .photo:hover {
            transform: scale(1.1) translateZ(20px);
            box-shadow: 0 20px 50px rgba(255,200,100,0.6);
            z-index: 20;
        }

        /* Position photos around the ring */
        .photo:nth-child(1) { top: 10%; left: 10%; transform: translate(-50%, -50%) rotate(0deg) translateY(-250px); }
        .photo:nth-child(2) { top: 20%; left: 30%; transform: translate(-50%, -50%) rotate(45deg) translateY(-250px); }
        .photo:nth-child(3) { top: 40%; left: 60%; transform: translate(-50%, -50%) rotate(90deg) translateY(-250px); }
        .photo:nth-child(4) { top: 70%; left: 85%; transform: translate(-50%, -50%) rotate(135deg) translateY(-250px); }
        .photo:nth-child(5) { top: 85%; left: 70%; transform: translate(-50%, -50%) rotate(180deg) translateY(-250px); }
        .photo:nth-child(6) { top: 75%; left: 40%; transform: translate(-50%, -50%) rotate(225deg) translateY(-250px); }
        .photo:nth-child(7) { top: 45%; left: 15%; transform: translate(-50%, -50%) rotate(270deg) translateY(-250px); }
        .photo:nth-child(8) { top: 25%; left: 5%;  transform: translate(-50%, -50%) rotate(315deg) translateY(-250px); }

        .audio-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #f4d03f;
            text-align: center;
            z-index: 100;
        }

        .play-btn, .pause-btn {
            background: rgba(244, 208, 63, 0.2);
            border: 2px solid #f4d03f;
            color: #f4d03f;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            margin: 0 10px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .play-btn:hover, .pause-btn:hover {
            background: rgba(244, 208, 63, 0.4);
            transform: scale(1.05);
        }

        .title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #f4d03f;
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(244, 208, 63, 0.8);
            z-index: 100;
            font-weight: bold;
        }

        @keyframes rotate {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .saturn-container:hover {
            animation-play-state: paused;
        }

        .saturn-planet {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="title">SATURN GALLERY</div>
    
    <div class="saturn-container">
        <div class="saturn-planet"></div>
        <div class="saturn-rings"></div>
        <div class="photo-ring">
            <img src="1.jpg" class="photo" alt="Photo 1" onclick="openModal(this.src, 'Photo 1')">
            <img src="2.jpg" class="photo" alt="Photo 2" onclick="openModal(this.src, 'Photo 2')">
            <img src="3.jpg" class="photo" alt="Photo 3" onclick="openModal(this.src, 'Photo 3')">
            <img src="4.jpg" class="photo" alt="Photo 4" onclick="openModal(this.src, 'Photo 4')">
            <img src="5.jpg" class="photo" alt="Photo 5" onclick="openModal(this.src, 'Photo 5')">
            <img src="6.jpg" class="photo" alt="Photo 6" onclick="openModal(this.src, 'Photo 6')">
            <img src="8.jpg" class="photo" alt="Photo 8" onclick="openModal(this.src, 'Photo 8')">
            <img src="9.jpg" class="photo" alt="Photo 9" onclick="openModal(this.src, 'Photo 9')">
        </div>
    </div>

    <div class="audio-controls">
        <button class="play-btn" onclick="playMusic()">▶ Play</button>
        <button class="pause-btn" onclick="pauseMusic()">⏸ Pause</button>
        <audio id="bgMusic" loop>
            <source src="hindia.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- Modal for full-screen photos -->
    <div id="photoModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center;">
        <img id="modalImg" style="max-width:90%; max-height:90%; border-radius:10px; box-shadow:0 0 50px rgba(255,255,255,0.5);">
        <button onclick="closeModal()" style="position:absolute; top:20px; right:20px; background:#f4d03f; color:#000; border:none; padding:10px 20px; border-radius:25px; cursor:pointer; font-size:18px;">✕</button>
    </div>

    <script>
        const audio = document.getElementById('bgMusic');
        let isPlaying = false;

        function playMusic() {
            audio.play();
            isPlaying = true;
        }

        function pauseMusic() {
            audio.pause();
            isPlaying = false;
        }

        function openModal(src, alt) {
            const modal = document.getElementById('photoModal');
            const modalImg = document.getElementById('modalImg');
            modalImg.src = src;
            modalImg.alt = alt;
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('photoModal').style.display = 'none';
        }

        // Auto-play music when page loads (with user interaction fallback)
        document.addEventListener('click', function() {
            if (!isPlaying) {
                playMusic();
            }
        }, { once: true });

        // Close modal on escape key or click outside
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        document.getElementById('photoModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Continuous gentle rotation
        document.querySelector('.saturn-container').style.animationDuration = '80s';
    </script>
</body>
</html>
